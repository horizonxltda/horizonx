<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon X</title>

  <!-- Fonte moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #131625;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* 🔥 sobe tudo */
	  
      overflow: hidden;
      color: #ffffff;
    }

    /* GRID animado no fundo */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: 
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: moveGrid 25s linear infinite;
      z-index: 0;
    }

    @keyframes moveGrid {
      0% { transform: translate(0,0); }
      100% { transform: translate(-60px,-60px); }
    }

    .container {
      text-align: center;
      z-index: 1;
      padding: 20px;
      max-width: 1000px;
    }

    /* LOGO MAIOR E PROTAGONISTA */
    .logo {
      max-width: 95%;
      max-height: 59vh;
      margin-bottom: 20px;
      animation: fadeIn 2s ease, glow 3s infinite alternate;
    }

    @keyframes glow {
      from {
        filter: drop-shadow(0 0 10px rgba(255,255,255,0.15));
      }
      to {
        filter: drop-shadow(0 0 30px rgba(0,150,255,0.6));
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* BLOCO DE TEXTO */
    .text-block h1 {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 15px;
    }

    .text-block h1 span {
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .text-block h2 {
      font-size: 28px;
      font-weight: 400;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .text-block p {
      font-size: 16px;
      color: #9ca3af;
      line-height: 1.6;
    }

    .highlight {
      color: #8b5cf6;
    }

    /* RESPONSIVO */
    @media (max-width: 768px) {
      .logo {
        max-height: 45vh;
        margin-bottom: 30px;
      }

      .text-block h1 {
        font-size: 34px;
      }

      .text-block h2 {
        font-size: 20px;
      }

      .text-block p {
        font-size: 14px;
      }
    }
	
  </style>
</head>

<body>

  <div class="container">

    <img src="logo_horizonx.png" class="logo" alt="Horizon X">

    <div class="text-block">
      <h1>
        Domine sua <br>
        <span>Infraestrutura</span>
      </h1>

      <h2>Simplifique seu DevOps.</h2>

      <p>
        Observabilidade avançada e gerenciamento moderno de containers com uma stack integrada —
        <span class="highlight">Arcane, Kuma, Dozzle, Netdata</span> e CI/CD.
      </p>
    </div>
  </div>

</body>
</html>
